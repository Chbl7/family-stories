    <style>
        body {
            background-color: #f7f3e8;
            font-family: 'Georgia', serif;
        }

        .cover-container {
            text-align: center;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #4a3b32;
            font-size: 2.2em;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #6d5e54;
            margin-bottom: 20px;
            font-style: italic;
        }

        /* Меню историй */
        nav ul {
            list-style: none;
            padding: 0;
            margin-bottom: 40px; 
        }

        nav li {
            margin: 10px 0;
        }

        nav a {
            display: block;
            background: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: #4a3b32;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #d4c5b0;
        }

        nav a:hover {
            background: #fffdf9;
            transform: translateX(5px);
            border-left-color: #8c7b6c;
        }

        /* Фотография */
        .family-photo-frame {
            background-color: white;
            padding: 10px 10px 40px 10px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: rotate(-2deg);
            max-width: 350px; 
            width: 100%;
        }

        .family-photo-frame img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #eee;
        }

        .caption {
            font-family: 'Courier New', monospace;
            color: #333;
            margin-top: 15px;
            font-size: 1em;
            font-weight: bold;
        }
        
        footer {
            margin-top: 40px;
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
